name: Daily Content Aggregation

on:
  schedule:
    # 每天 UTC 2:00（北京时间 10:00）执行
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  aggregate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci
          pip install cos-python-sdk-v5

      - name: Run aggregation script
        run: python3 scripts/aggregate.py

      - name: Check for new content
        id: check
        run: |
          git add content/
          if git diff --cached --quiet; then
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "📭 没有新内容"
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "📬 发现新内容！"
          fi

      - name: Commit new content
        if: steps.check.outputs.has_new == 'true'
        run: |
          git config user.name "AI Dev Hub Bot"
          git config user.email "bot@ai-dev-hub.com"
          git commit -m "feat(content): 自动聚合新文章 $(date +%Y-%m-%d)"
          git push

      - name: Build and Deploy
        if: steps.check.outputs.has_new == 'true'
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: python3 scripts/deploy.py
